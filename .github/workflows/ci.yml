name: CI
# Integration tests live in a separate `integration` job gated on workflow_dispatch
# because they require a real HEROKUMCP_TEST_TOKEN secret and consume rate-limit budget.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    name: typecheck / lint / test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Lint
        run: pnpm -r lint
      - name: Format check
        run: pnpm -r format:check
      - name: Test
        run: pnpm -r test
      - name: Build
        run: pnpm -r build
  integration:
    name: integration (live api.heroku.com)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm -r build
      - name: Integration tests
        env:
          HEROKUMCP_TEST_TOKEN: ${{ secrets.HEROKUMCP_TEST_TOKEN }}
        run: pnpm -r test:integration